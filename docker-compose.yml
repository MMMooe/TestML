services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile.gpu
      network: ${DOCKER_BUILD_NETWORK:-host}
      args:
        CUDA_BASE_IMAGE: ${CUDA_BASE_IMAGE:-nvidia/cuda:12.1.1-cudnn8-runtime-ubuntu22.04}
        UBUNTU_APT_MIRROR: ${UBUNTU_APT_MIRROR:-http://archive.ubuntu.com/ubuntu}
        UBUNTU_SECURITY_APT_MIRROR: ${UBUNTU_SECURITY_APT_MIRROR:-http://security.ubuntu.com/ubuntu}
        NVIDIA_APT_MIRROR: ${NVIDIA_APT_MIRROR:-https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2204/x86_64}
        APT_RETRIES: ${APT_RETRIES:-3}
        APT_TIMEOUT: ${APT_TIMEOUT:-20}
        APT_FORCE_IPV4: ${APT_FORCE_IPV4:-true}
        TENSORRT_APT_PACKAGES: ${TENSORRT_APT_PACKAGES:-python3-libnvinfer libnvinfer8 libnvinfer-plugin8 libnvinfer-bin}
    environment:
      APP_MODE: production-cuda
      APP_REQUIRE_TENSORRT: "true"
      APP_STORAGE_DIR: /app/storage
      APP_CORS_ORIGINS: "http://localhost:3000,http://127.0.0.1:3000"
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    gpus: all
    runtime: nvidia
    ports:
      - "8000:8000"
    volumes:
      - ./storage:/app/storage
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 20s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      network: ${DOCKER_BUILD_NETWORK:-host}
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
        NODE_BASE_IMAGE: ${NODE_BASE_IMAGE:-node:20-alpine}
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
